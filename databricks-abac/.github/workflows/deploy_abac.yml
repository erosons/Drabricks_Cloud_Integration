# ─────────────────────────────────────────────
# .github/workflows/deploy_abac.yml
#
# CI/CD pipeline for Databricks ABAC policies.
# Workflow:
#   PR       → terraform plan for target env
#   Merge    → auto-apply dev
#   Tag v*   → promote through qa → uat → prd
#              with manual approval gate at prd
# ─────────────────────────────────────────────

name: Deploy ABAC Policies

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: "."

jobs:

  # ── Validate on every PR ────────────────────
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (dev)
        run: |
          terraform init \
            -backend-config="key=databricks-abac/dev/terraform.tfstate" \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (dev)
        run: |
          terraform plan \
            -var-file="environments/dev/dev.tfvars" \
            -compact-warnings \
            -out=tfplan_dev
        env:
          TF_VAR_databricks_account_client_id:       ${{ secrets.DEV_ACCOUNT_CLIENT_ID }}
          TF_VAR_databricks_account_client_secret:   ${{ secrets.DEV_ACCOUNT_CLIENT_SECRET }}
          TF_VAR_databricks_workspace_client_id:     ${{ secrets.DEV_WORKSPACE_CLIENT_ID }}
          TF_VAR_databricks_workspace_client_secret: ${{ secrets.DEV_WORKSPACE_CLIENT_SECRET }}
          TF_VAR_databricks_account_id:              ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_databricks_workspace_url:           ${{ secrets.DEV_WORKSPACE_URL }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan_dev
          path: tfplan_dev
          retention-days: 3


  # ── Auto-deploy to dev on merge to main ─────
  deploy_dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="key=databricks-abac/dev/terraform.tfstate" \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform apply (dev)
        run: |
          terraform apply \
            -var-file="environments/dev/dev.tfvars" \
            -auto-approve \
            -compact-warnings
        env:
          TF_VAR_databricks_account_client_id:       ${{ secrets.DEV_ACCOUNT_CLIENT_ID }}
          TF_VAR_databricks_account_client_secret:   ${{ secrets.DEV_ACCOUNT_CLIENT_SECRET }}
          TF_VAR_databricks_workspace_client_id:     ${{ secrets.DEV_WORKSPACE_CLIENT_ID }}
          TF_VAR_databricks_workspace_client_secret: ${{ secrets.DEV_WORKSPACE_CLIENT_SECRET }}
          TF_VAR_databricks_account_id:              ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_databricks_workspace_url:           ${{ secrets.DEV_WORKSPACE_URL }}


  # ── Deploy qa on version tag ─────────────────
  deploy_qa:
    name: Deploy → qa
    runs-on: ubuntu-latest
    needs: deploy_dev
    if: startsWith(github.ref, 'refs/tags/v')
    environment: qa

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init + apply (qa)
        run: |
          terraform init \
            -backend-config="key=databricks-abac/qa/terraform.tfstate" \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
          terraform apply \
            -var-file="environments/qa/qa.tfvars" \
            -auto-approve \
            -compact-warnings
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_databricks_account_client_id:       ${{ secrets.QA_ACCOUNT_CLIENT_ID }}
          TF_VAR_databricks_account_client_secret:   ${{ secrets.QA_ACCOUNT_CLIENT_SECRET }}
          TF_VAR_databricks_workspace_client_id:     ${{ secrets.QA_WORKSPACE_CLIENT_ID }}
          TF_VAR_databricks_workspace_client_secret: ${{ secrets.QA_WORKSPACE_CLIENT_SECRET }}
          TF_VAR_databricks_account_id:              ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_databricks_workspace_url:           ${{ secrets.QA_WORKSPACE_URL }}


  # ── Deploy uat (manual approval required) ───
  deploy_uat:
    name: Deploy → uat
    runs-on: ubuntu-latest
    needs: deploy_qa
    if: startsWith(github.ref, 'refs/tags/v')
    environment: uat    # requires approval in GitHub env settings

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init + apply (uat)
        run: |
          terraform init \
            -backend-config="key=databricks-abac/uat/terraform.tfstate" \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
          terraform apply \
            -var-file="environments/uat/uat.tfvars" \
            -auto-approve \
            -compact-warnings
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_databricks_account_client_id:       ${{ secrets.UAT_ACCOUNT_CLIENT_ID }}
          TF_VAR_databricks_account_client_secret:   ${{ secrets.UAT_ACCOUNT_CLIENT_SECRET }}
          TF_VAR_databricks_workspace_client_id:     ${{ secrets.UAT_WORKSPACE_CLIENT_ID }}
          TF_VAR_databricks_workspace_client_secret: ${{ secrets.UAT_WORKSPACE_CLIENT_SECRET }}
          TF_VAR_databricks_account_id:              ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_databricks_workspace_url:           ${{ secrets.UAT_WORKSPACE_URL }}


  # ── Deploy prd (manual approval required) ───
  deploy_prd:
    name: Deploy → prd
    runs-on: ubuntu-latest
    needs: deploy_uat
    if: startsWith(github.ref, 'refs/tags/v')
    environment: prd    # requires approval + reviewers in GitHub env settings

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init + apply (prd)
        run: |
          terraform init \
            -backend-config="key=databricks-abac/prd/terraform.tfstate" \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"
          terraform apply \
            -var-file="environments/prd/prd.tfvars" \
            -auto-approve \
            -compact-warnings
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_databricks_account_client_id:       ${{ secrets.PRD_ACCOUNT_CLIENT_ID }}
          TF_VAR_databricks_account_client_secret:   ${{ secrets.PRD_ACCOUNT_CLIENT_SECRET }}
          TF_VAR_databricks_workspace_client_id:     ${{ secrets.PRD_WORKSPACE_CLIENT_ID }}
          TF_VAR_databricks_workspace_client_secret: ${{ secrets.PRD_WORKSPACE_CLIENT_SECRET }}
          TF_VAR_databricks_account_id:              ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_databricks_workspace_url:           ${{ secrets.PRD_WORKSPACE_URL }}
